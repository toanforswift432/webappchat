upstream chatapp_backend {
    # ip_hash ensures the same client sticks to the same backend instance.
    # Required for SignalR long-polling fallback; NOT needed when using Redis backplane
    # with WebSocket-only transport (which is the default).
    # Remove ip_hash if you have confirmed Redis backplane is active.
    ip_hash;

    server 127.0.0.1:5054;
    server 127.0.0.1:5055;
    server 127.0.0.1:5056;
    # Add more backend instances as needed
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name nhantrisolution.ddns.net;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nhantrisolution.ddns.net;

    ssl_certificate     /etc/ssl/certs/chatapp.crt;
    ssl_certificate_key /etc/ssl/private/chatapp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Max upload size (for file messages)
    client_max_body_size 50m;

    # SignalR WebSocket — long timeout, no buffering
    location /hubs/ {
        proxy_pass         http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # API and all other backend routes
    location / {
        proxy_pass         http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
